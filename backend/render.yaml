services:
  - type: web
    name: auth-ecosystem-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: auth-ecosystem-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: auth-ecosystem-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: auth-ecosystem-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: auth-ecosystem-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: auth-ecosystem-db
          property: database
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 24h
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: BUSINESS_VERIFICATION_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: SEPOLIA_URL
        sync: false
      - key: ADMIN_PRIVATE_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: PROCUREMENT_LOG_ADDRESS
        sync: false

databases:
  - name: auth-ecosystem-db
    databaseName: auth_ecosystem
    plan: free 